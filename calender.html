<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeLink</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="princess">

<header>
    <h1>TimeLink</h1>
    <p></p>
</header>

<div class="theme-switch">

<button onclick="location.href='index.html'">
🏠 ホーム
</button>

<button onclick="setPrincess()">👑 Princess Mode</button>
<button onclick="setPrince()">🤴 Prince Mode</button>

</div>

<div class="calendar-header">

<button onclick="prevMonth()">◀</button>

<h2 id="monthYear"></h2>

<button onclick="nextMonth()">▶</button>

</div>

<div class="weekdays">
  <div>日</div>
  <div>月</div>
  <div>火</div>
  <div>水</div>
  <div>木</div>
  <div>金</div>
  <div>土</div>
</div>

<div id="calendar"></div>

<div class="add-event">

<h3>予定を追加</h3>

<input type="date" id="eventDate">

<select id="eventType">
    <option value="date">❤️ デート</option>
    <option value="anniversary">🎁 記念日</option>
    <option value="plan">📅 予定</option>
</select>

<input type="text" id="eventText" placeholder="内容">

<button onclick="addEvent()">追加</button>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
